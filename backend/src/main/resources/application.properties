# Server
server.port=8081

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/mentormatch_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

