<div class="auth-container">
  <div class="auth-card">

    <div class="auth-header">
      <h1 class="brand">MentorMatch</h1>
      <p class="subtitle">Sign in to your account</p>
    </div>

    <form id="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          [class.input-error]="email?.invalid && email?.touched"
        />
        <span class="error-text" *ngIf="email?.invalid && email?.touched">
          <span *ngIf="email?.errors?.['required']">Email is required</span>
          <span *ngIf="email?.errors?.['email']">Enter a valid email</span>
        </span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Enter your password"
          [class.input-error]="password?.invalid && password?.touched"
        />
        <span class="error-text" *ngIf="password?.invalid && password?.touched">
          <span *ngIf="password?.errors?.['required']">Password is required</span>
          <span *ngIf="password?.errors?.['minlength']">Minimum 6 characters</span>
        </span>
      </div>

      <div id="login-error" class="server-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button id="login-submit-btn" type="submit" class="btn-primary" [disabled]="isLoading">
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>

    </form>

    <p class="auth-footer">
      Don't have an account?
      <a routerLink="/auth/register">Register here</a>
    </p>

  </div>
</div>
