<div id="login-div-1" class="auth-container">
  <div id="login-div-2" class="auth-card">

    <div id="login-div-3" class="auth-header">
      <h1 id="login-h1-4" class="brand">MentorMatch</h1>
      <p id="login-p-5" class="subtitle">Sign in to your account</p>
    </div>

    <form id="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

      <div id="login-div-7" class="form-group">
        <label id="login-label-8" for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          [class.input-error]="email?.invalid && email?.touched"
        />
        <span id="login-span-10" class="error-text" *ngIf="email?.invalid && email?.touched">
          <span id="login-span-11" *ngIf="email?.errors?.['required']">Email is required</span>
          <span id="login-span-12" *ngIf="email?.errors?.['email']">Enter a valid email</span>
        </span>
      </div>

      <div id="login-div-13" class="form-group">
        <label id="login-label-14" for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Enter your password"
          [class.input-error]="password?.invalid && password?.touched"
        />
        <span id="login-span-16" class="error-text" *ngIf="password?.invalid && password?.touched">
          <span id="login-span-17" *ngIf="password?.errors?.['required']">Password is required</span>
          <span id="login-span-18" *ngIf="password?.errors?.['minlength']">Minimum 6 characters</span>
        </span>
      </div>

      <div id="login-error" class="server-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button id="login-submit-btn" type="submit" class="btn-primary" [disabled]="isLoading">
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>

    </form>

    <p id="login-p-21" class="auth-footer">
      Don't have an account?
      <a id="login-a-22" routerLink="/auth/register">Register here</a>
    </p>

  </div>
</div>
