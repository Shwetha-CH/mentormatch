<div id="register-div-1" class="auth-container">
  <div id="register-div-2" class="auth-card">

    <div id="register-div-3" class="auth-header">
      <h1 id="register-h1-4" class="brand">MentorMatch</h1>
      <p id="register-p-5" class="subtitle">Create your account</p>
    </div>

    <form id="register-form" [formGroup]="registerForm" (ngSubmit)="onSubmit()" novalidate>

      <div id="register-div-7" class="form-group">
        <label id="register-label-8" for="fullName">Full Name</label>
        <input
          id="fullName"
          type="text"
          formControlName="fullName"
          placeholder="Enter your name"
          [class.input-error]="fullName?.invalid && fullName?.touched"
        />
        <span id="register-span-10" class="error-text" *ngIf="fullName?.invalid && fullName?.touched">
          <span id="register-span-11" *ngIf="fullName?.errors?.['required']">Full name is required</span>
          <span id="register-span-12" *ngIf="fullName?.errors?.['minlength']">Minimum 2 characters</span>
        </span>
      </div>

      <div id="register-div-13" class="form-group">
        <label id="register-label-14" for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          [class.input-error]="email?.invalid && email?.touched"
        />
        <span id="register-span-16" class="error-text" *ngIf="email?.invalid && email?.touched">
          <span id="register-span-17" *ngIf="email?.errors?.['required']">Email is required</span>
          <span id="register-span-18" *ngIf="email?.errors?.['email']">Enter a valid email</span>
        </span>
      </div>

      <div id="register-div-19" class="form-group">
        <label id="register-label-20" for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Minimum 6 characters"
          [class.input-error]="password?.invalid && password?.touched"
        />
        <span id="register-span-22" class="error-text" *ngIf="password?.invalid && password?.touched">
          <span id="register-span-23" *ngIf="password?.errors?.['required']">Password is required</span>
          <span id="register-span-24" *ngIf="password?.errors?.['minlength']">Minimum 6 characters</span>
        </span>
      </div>

      <div id="register-div-25" class="form-group">
        <label id="register-label-26" for="role">I am a</label>
        <select
          id="role"
          formControlName="role"
          [class.input-error]="role?.invalid && role?.touched"
        >
          <option id="register-option-28" value="">Select your role</option>
          <option id="register-option-29" value="STUDENT">Student</option>
          <option id="register-option-30" value="MENTOR">Mentor</option>
        </select>
        <span id="register-span-31" class="error-text" *ngIf="role?.invalid && role?.touched">
          Role is required
        </span>
      </div>

      <div id="register-error" class="server-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <div id="register-success" class="success-msg" *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <button id="register-submit-btn" type="submit" class="btn-primary" [disabled]="isLoading">
        {{ isLoading ? 'Creating account...' : 'Create Account' }}
      </button>

    </form>

    <p id="register-p-35" class="auth-footer">
      Already have an account?
      <a id="register-a-36" routerLink="/auth/login">Sign in</a>
    </p>

  </div>
</div>
