<!-- src/app/features/student/notifications/notifications.component.html -->

<div id="notifications-div-1" class="page">

    <div id="notifications-div-2" class="page-header">
        <div id="notifications-div-3">
            <h1 id="notifications-h1-4">Notifications</h1>
            <p id="notifications-p-5" class="sub">All your alerts in one place</p>
        </div>
        <button id="notifications-button-6" class="btn-primary" *ngIf="notifications.length > 0" (click)="markAllRead()">
            Mark all as read
        </button>
    </div>

    <div id="notifications-div-7" *ngIf="loading" class="state-msg">Loading…</div>

    <div id="notifications-div-8" *ngIf="!loading && notifications.length === 0" class="state-msg">
        No notifications yet.
    </div>

    <div id="notifications-div-9" class="notif-list" *ngIf="!loading && notifications.length > 0">
        <div
        [id]="'notifications-div-10-' + nIndex1"
                *ngFor="let n of notifications; let nIndex1 = index"
                class="notif-card"
                [class.unread]="!n.isRead"
                (click)="onClickNotification(n)">

            <div [id]="'notifications-div-11-' + nIndex1" class="notif-dot" *ngIf="!n.isRead"></div>
            <div id="notifications-div-12" class="notif-body">
                <div id="notifications-div-13" class="notif-top">
                    <span id="notifications-span-14" class="notif-title">{{ n.title }}</span>
                    <span id="notifications-span-15" class="notif-time">{{ formatDate(n.createdAt) }}</span>
                </div>
                <span id="notifications-span-16" class="notif-msg">{{ n.message }}</span>
            </div>
        </div>
    </div>

</div>
