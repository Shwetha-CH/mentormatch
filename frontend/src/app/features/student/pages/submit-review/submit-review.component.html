<!-- src/app/features/student/pages/submit-review/submit-review.component.html -->

<app-student-navbar id="submit-review-app-student-navbar-1"></app-student-navbar>

<div id="submit-review-div-2" class="review-page">
    <div id="submit-review-div-3" class="review-card">

        <button id="submit-review-button-4" class="back-btn" (click)="goBack()">← Back to sessions</button>

        <p id="submit-review-p-5" class="card-label">Leave a review</p>
        <h2 id="submit-review-h2-6">How was your session?</h2>
        <p id="submit-review-p-7" class="sub">Your feedback helps other students find great mentors.</p>

        <!-- Success message -->
        <div id="submit-review-div-8" class="banner success" *ngIf="successMsg">
            ✓ {{ successMsg }}
        </div>

        <!-- Error message -->
        <div id="submit-review-div-9" class="banner error" *ngIf="errorMsg">
            {{ errorMsg }}
        </div>

        <ng-container *ngIf="!successMsg">

            <!-- Star rating -->
            <div id="submit-review-div-10" class="stars-row">
        <span
                [id]="'star-' + star"
                *ngFor="let star of stars; let starIndex1 = index"
                [class]="getStarClass(star)"
                (click)="setRating(star)"
                (mouseenter)="hoveredRating = star"
                (mouseleave)="hoveredRating = 0">
          ★
        </span>
            </div>
            <p id="submit-review-p-12" class="rating-label" *ngIf="selectedRating > 0">
                {{ selectedRating }} / 5
                <span id="submit-review-span-13" *ngIf="selectedRating === 5"> — Excellent!</span>
                <span id="submit-review-span-14" *ngIf="selectedRating === 4"> — Great!</span>
                <span id="submit-review-span-15" *ngIf="selectedRating === 3"> — Good</span>
                <span id="submit-review-span-16" *ngIf="selectedRating === 2"> — Fair</span>
                <span id="submit-review-span-17" *ngIf="selectedRating === 1"> — Poor</span>
            </p>

            <!-- Comment -->
            <div id="submit-review-div-18" class="field">
                <label id="submit-review-label-19" for="comment">Comment <span id="submit-review-span-20" class="optional">(optional)</span></label>
                <textarea id="comment" rows="4"
                          [(ngModel)]="comment"
                          placeholder="Share what you learned, how the mentor helped you...">
        </textarea>
            </div>

            <!-- Submit -->
            <button id="review-submit-btn"
                    class="btn-submit"
                    [disabled]="selectedRating === 0 || submitting"
                    (click)="onSubmit()">
                {{ submitting ? 'Submitting...' : 'Submit Review' }}
            </button>

        </ng-container>

    </div>
</div>
