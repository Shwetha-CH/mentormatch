<!-- src/app/features/student/components/student-navbar/student-navbar.component.html -->

<nav class="navbar">
    <div class="navbar-inner">

        <!-- Brand -->
        <div class="brand" (click)="navigate('/student/dashboard')">
            <span class="brand-icon">🎓</span>
            <span class="brand-name">MentorMatch</span>
        </div>

        <!-- Nav links -->
        <ul class="nav-links">
            <li *ngFor="let item of navItems">
                <button class="nav-btn"
                        [class.active]="isActive(item.route)"
                        (click)="navigate(item.route)">
                    <span class="nav-icon">{{ item.icon }}</span>
                    <span class="nav-label">{{ item.label }}</span>
                    <span class="notif-badge" *ngIf="item.label === 'Notifications' && unreadCount > 0">
                        {{ unreadCount > 9 ? '9+' : unreadCount }}
                    </span>
                </button>
            </li>
        </ul>

        <!-- Right — user dropdown -->
        <div class="nav-right">
            <div class="user-dropdown-wrap">
                <button class="user-pill-btn" (click)="toggleDropdown()">
                    <div class="user-avatar">{{ initials }}</div>
                    <span class="user-name">{{ fullName }}</span>
                    <span class="chevron" [class.open]="showDropdown">▾</span>
                </button>
                <div class="dropdown-menu" *ngIf="showDropdown">
                    <div class="dropdown-header">
                        <p class="dd-name">{{ fullName }}</p>
                        <p class="dd-email">{{ email }}</p>
                    </div>
                    <hr class="dd-divider" />
                    <button class="dd-item logout-item" (click)="logout()">
                        <span>⏻</span> Logout
                    </button>
                </div>
            </div>
        </div>

    </div>
</nav>

<!-- Overlay to close dropdown on outside click -->
<div class="overlay-dismiss" *ngIf="showDropdown" (click)="closeDropdown()"></div>
