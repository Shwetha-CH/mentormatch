<!-- src/app/features/admin/components/stat-card/stat-card.component.html -->

<div id="stat-card-div-1" class="stat-card" [class]="'stat-card-' + color">
  <div id="stat-card-div-2" class="stat-icon">{{ icon }}</div>
  <div id="stat-card-div-3" class="stat-content">
    <p id="stat-card-p-4" class="stat-label">{{ label }}</p>
    <h2 id="stat-card-h2-5" class="stat-value">{{ value | number }}</h2>
  </div>
</div>
